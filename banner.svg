<svg width="100%" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0a1f44"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Title -->
  <text x="50%" y="120" font-size="60" text-anchor="middle" fill="url(#textGradient)" font-family="Arial" font-weight="bold">
    Jyotish Deka
  </text>

  <!-- Subtitle -->
  <text x="50%" y="170" font-size="18" text-anchor="middle" fill="#cbd5e1" font-family="Arial">
    AI Developer | Web3 | Open Source Contributor
  </text>

  <!-- Divider -->
  <line x1="200" y1="190" x2="800" y2="190" stroke="#3b82f6" stroke-width="1"/>

  <!-- Tagline -->
  <text x="50%" y="230" font-size="16" text-anchor="middle" fill="#38bdf8" font-family="monospace">
    &lt; I Am Ready To Work /&gt;
  </text>

</svg>
